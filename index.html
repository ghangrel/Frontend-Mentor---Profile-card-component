<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,40..300&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card component</title>
</head>
<body>
    <main class="card">
        <div class="blue"></div>
        <div class="photo">
            <img src="img/image-victor.jpg" alt="">
        </div>
        <div class="name">
            <h2><strong>Victor Crest</strong> 26</h2>
            <p>London</p>
        </div>
        <div class="bar"></div>
        <div class="stats">
            
            <div class="stat">
                <h2><strong>80K</strong></h2>
                <span>Followers</span>
            </div>

            <div class="stat">
                <h2><strong>803K</strong></h2>
                <span>Likes</span>
            </div>

            <div class="stat">
                <h2><strong>1.4K</strong></h2>
                <span>Photos</span>
            </div>

        </div>
    </main>
</body>
</html>
